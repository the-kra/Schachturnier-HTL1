<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140" font-family="'Lexend', sans-serif" role="img" aria-label="kranzlab">
        <defs>
          <radialGradient id="moonGrad" cx="36%" cy="34%">
            <stop offset="0%" stop-color="#f6f8fb"/><stop offset="55%" stop-color="#c2ccd9"/><stop offset="100%" stop-color="#8a98ab"/>
          </radialGradient>
          <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#d6dde6"/><stop offset="100%" stop-color="#7a8696"/>
          </linearGradient>
          <filter id="moonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.0" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="moonClip"><circle cx="70" cy="70" r="42"/></clipPath>
          <radialGradient id="sphereShade" cx="36%" cy="34%" r="72%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/><stop offset="55%" stop-color="#ffffff" stop-opacity="0"/><stop offset="100%" stop-color="#05070b" stop-opacity="0.55"/>
          </radialGradient>
        </defs>
        <rect x="0" y="0" width="440" height="140" rx="16" fill="none"/>
        <g>
          <circle cx="70" cy="70" r="61" fill="none" stroke="url(#ringGrad)" stroke-width="4" opacity="0.85"/>
          <g filter="url(#moonGlow)">
            <circle cx="70" cy="70" r="42" fill="url(#moonGrad)"/>
            <g clip-path="url(#moonClip)">
              <g transform="rotate(-10 70 70)">
                <g><animateTransform attributeName="transform" type="translate" from="0 0" to="-84 0" dur="7s" repeatCount="indefinite"/>
                  <circle cx="49" cy="63" r="7" fill="#8a98ab" opacity="0.5"/><circle cx="70" cy="84" r="4.9" fill="#8a98ab" opacity="0.45"/>
                  <circle cx="88" cy="56" r="6" fill="#8a98ab" opacity="0.5"/><circle cx="105" cy="77" r="3.9" fill="#8a98ab" opacity="0.4"/></g>
                <g transform="translate(84 0)"><animateTransform attributeName="transform" type="translate" from="84 0" to="0 0" dur="7s" repeatCount="indefinite"/>
                  <circle cx="49" cy="63" r="7" fill="#8a98ab" opacity="0.5"/><circle cx="70" cy="84" r="4.9" fill="#8a98ab" opacity="0.45"/>
                  <circle cx="88" cy="56" r="6" fill="#8a98ab" opacity="0.5"/><circle cx="105" cy="77" r="3.9" fill="#8a98ab" opacity="0.4"/></g>
              </g>
              <circle cx="94.5" cy="54" r="37" fill="#05070b" opacity="0.78"/>
              <circle cx="70" cy="70" r="42" fill="url(#sphereShade)"/>
            </g>
          </g>
          <circle cx="103" cy="42" r="5.2" fill="#f6f8fb"/>
        </g>
        <text x="158" y="86" font-size="70" font-weight="500" letter-spacing="-1.6" transform="translate(23.7 0) scale(0.85 1)">
          <tspan fill="#ffffff">kranz</tspan><tspan fill="#aeb8c6">lab</tspan>
        </text>
      </svg>
